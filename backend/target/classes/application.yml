server:
  port: 8080

spring:
  application:
    name: anon-chat-backend

  # MongoDB Configuration (Atlas compatible)
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/anonchat}
      database: ${MONGODB_DATABASE:anonchat}

    # Redis Configuration (Upstash compatible)
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: 2000ms

  # WebSocket / STOMP
  websocket:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method

# Logging
logging:
  level:
    com.anonchat: DEBUG
    org.springframework.web.socket: INFO

# App-specific config
app:
  chat:
    session-ttl-seconds: 3600       # 1 hour session TTL in Redis
    queue-ttl-seconds: 300          # 5 min max wait in queue
    idle-timeout-seconds: 120       # 2 min idle before cleanup
  rate-limit:
    messages-per-minute: 60
